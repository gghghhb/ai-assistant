<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多层级任务清单-完整修复版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#f6f8fa;padding:12px;max-width:1000px;margin:0 auto}

.header{
    background:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 2px 8px #e0e4ec;
    margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;
    position:relative;
}
.header h1{font-size:18px;color:#222}
.header-right{display:flex;gap:8px;align-items:center}

.func-btn{
    padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:13px;
    background:#f0f2f5;color:#606266;
}
.func-btn:hover{background:#e4e7ed}
.func-btn.active{background:#409eff;color:#fff}

.menu-btn{
    width:34px;height:34px;border:none;background:#409eff;color:#fff;border-radius:6px;
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.menu-btn:hover{background:#337ecc}

.dropdown-menu{
    position:absolute;top:52px;right:16px;background:#fff;border-radius:8px;
    box-shadow:0 4px 16px rgba(0,0,0,0.15);padding:6px 0;display:none;z-index:100;
    min-width:180px;
}
.dropdown-menu.show{display:block}
.menu-item{
    padding:8px 14px;cursor:pointer;font-size:13px;
}
.menu-item:hover{background:#f5f7fa}
.menu-divider{height:1px;background:#eee;margin:4px 0}

.hide-submenu{
    padding-left:10px;display:none;
}
.hide-submenu.show{display:block}
.hide-submenu .menu-item{font-size:12px;padding:6px 14px 6px 20px}

.legend{
    background:#fff;padding:8px 16px;border-radius:10px;box-shadow:0 2px 8px #e0e4ec;
    margin-bottom:10px;display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:#666;
    align-items:center;
}
.legend-title{font-weight:bold}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-color{width:20px;height:14px;border-radius:3px}

.tree-container{background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 8px #e0e4ec}

/* 四级渐变配色 */
.level-0 .task-main{
    border-left:6px solid transparent;
    border-image: linear-gradient(to bottom, #ff7675, #e74c3c, #c0392b) 1;
    padding-left:10px;
}
.level-0 .progress-bar{background:linear-gradient(to right, #ff7675, #c0392b)}
.level-0 .legend-color{background:linear-gradient(to right, #ff7675, #c0392b)}

.level-1 .task-main{
    border-left:6px solid transparent;
    border-image: linear-gradient(to bottom, #55efc4, #27ae60, #1e8449) 1;
    padding-left:10px;
}
.level-1 .progress-bar{background:linear-gradient(to right, #55efc4, #1e8449)}
.level-1 .legend-color{background:linear-gradient(to right, #55efc4, #1e8449)}

.level-2 .task-main{
    border-left:6px solid transparent;
    border-image: linear-gradient(to bottom, #74b9ff, #2980b9, #1f618d) 1;
    padding-left:10px;
}
.level-2 .progress-bar{background:linear-gradient(to right, #74b9ff, #1f618d)}
.level-2 .legend-color{background:linear-gradient(to right, #74b9ff, #1f618d)}

.level-3 .task-main{
    border-left:6px solid transparent;
    border-image: linear-gradient(to bottom, #a29bfe, #8e44ad, #6c3483) 1;
    padding-left:10px;
}
.level-3 .progress-bar{background:linear-gradient(to right, #a29bfe, #6c3483)}
.level-3 .legend-color{background:linear-gradient(to right, #a29bfe, #6c3483)}

.level-4 .task-main,
.level-5 .task-main,
.level-6 .task-main{
    border-left:6px solid transparent;
    border-image: linear-gradient(to bottom, #636e72, #2d3436, #1e272e) 1;
    padding-left:10px;
}
.level-4 .progress-bar,
.level-5 .progress-bar,
.level-6 .progress-bar{background:linear-gradient(to right, #636e72, #1e272e)}
.level-4 .legend-color{background:linear-gradient(to right, #636e72, #1e272e)}

.tree-item{margin:6px 0}
.tree-item.hidden{display:none}

.task-main{
    display:flex;align-items:center;gap:8px;padding:6px 10px;
    background:#fafbfc;border-radius:0 5px 0 0;cursor:pointer;
}
.task-text{
    font-size:14px;flex:1;font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    user-select:none;
}
.task-text.expanded{
    white-space:normal;word-break:break-all;
}
.completed .task-text{text-decoration:line-through;color:#909399}
.indeterminate .task-text{color:#409eff}

/* 逾期任务文字标红 */
.overdue-text .task-text{color:#e74c3c;font-weight:bold}

.more-btn{
    width:22px;height:22px;border:none;background:transparent;border-radius:4px;
    cursor:pointer;font-size:16px;color:#909399;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
}
.more-btn:hover{background:#e4e7ed;color:#606266}

.date-tag{
    font-size:11px;padding:2px 6px;border-radius:3px;background:#e8f4ff;
    color:#409eff;flex-shrink:0;cursor:pointer;
}
.date-tag.overdue{
    background:#fef0f0;color:#e74c3c;
    animation:pulse 1.5s infinite;
}
@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:0.4}
}

.overdue-icon{
    color:#e74c3c;font-weight:bold;font-size:14px;flex-shrink:0;
    animation:pulse 1.5s infinite;
}

.toggle-arrow{
    width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:10px;color:#666;user-select:none;transition:transform 0.2s;
    flex-shrink:0;
}
.toggle-arrow.collapsed{transform:rotate(-90deg)}
.toggle-arrow.empty{visibility:hidden}

.task-actions{
    display:none;gap:6px;padding:4px 10px 6px 34px;
    background:#fafbfc;border-radius:0 0 5px 5px;
}
.task-actions.show{display:flex}
.task-actions .btn{
    padding:3px 10px;font-size:12px;border:none;border-radius:4px;cursor:pointer;
}
.btn-add{background:#27ae60;color:#fff}
.btn-edit{background:#f39c12;color:#fff}
.btn-del{background:#e74c3c;color:#fff}

.progress-wrap{
    width:calc(100% - 34px);height:5px;background:#e4e7ed;border-radius:3px;
    margin:3px 0 3px 34px;
}
.progress-bar{height:100%;border-radius:3px;transition:0.2s width}

.children-wrap{margin-left:18px;margin-top:3px;overflow:hidden}
.children-wrap.collapsed{display:none}
.empty-tip{color:#909399;padding:24px;text-align:center;font-size:13px}

.check-box{width:14px;height:14px;cursor:pointer;flex-shrink:0}

.modal-mask{
    position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);
    display:none;align-items:center;justify-content:center;z-index:999
}
.modal-box{
    width:90%;max-width:460px;background:#fff;padding:20px;border-radius:10px
}
.modal-title{font-size:16px;font-weight:bold;margin-bottom:14px}
.modal-input{
    width:100%;padding:8px 10px;border:1px solid #dcdfe6;border-radius:6px;
    font-size:14px;margin-bottom:12px;
}
.modal-label{font-size:13px;color:#606266;margin-bottom:4px;display:block}
.modal-date-row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.modal-date-row input[type="date"]{
    flex:1;padding:8px 10px;border:1px solid #dcdfe6;border-radius:6px;font-size:14px;
}
.modal-date-row .btn-clear-date{
    padding:8px 12px;border:1px solid #dcdfe6;background:#fff;border-radius:6px;
    cursor:pointer;font-size:13px;color:#606266;
}
.modal-textarea{
    width:100%;min-height:120px;padding:8px 10px;border:1px solid #dcdfe6;
    border-radius:6px;font-size:13px;resize:vertical;margin-bottom:14px;
}
.modal-tip{font-size:12px;color:#909399;margin-bottom:10px;line-height:1.6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.btn-primary{background:#409eff;color:#fff}
.btn-default{background:#fff;color:#606266;border:1px solid #dcdfe6}
</style>
</head>
<body>

<div class="header">
    <h1>📋 任务清单</h1>
    <div class="header-right">
        <button class="func-btn" id="hideDoneBtn">隐藏已完成</button>
        <button class="menu-btn" id="menuBtn">+</button>
    </div>
    <div class="dropdown-menu" id="dropdownMenu">
        <div class="menu-item" id="menuAddTop">新增顶层任务</div>
        <div class="menu-item" id="menuImport">批量导入树形文本</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="menuHideLevel">
            按层级隐藏已完成 ▸
            <div class="hide-submenu" id="hideSubmenu">
                <div class="menu-item" data-hidelevel="0">隐藏第1层(红)已完成</div>
                <div class="menu-item" data-hidelevel="1">隐藏第2层(绿)已完成</div>
                <div class="menu-item" data-hidelevel="2">隐藏第3层(蓝)已完成</div>
                <div class="menu-item" data-hidelevel="3">隐藏第4层(紫)已完成</div>
                <div class="menu-item" data-hidelevel="4">隐藏深层(灰)已完成</div>
                <div class="menu-divider"></div>
                <div class="menu-item" id="showAllBtn">显示全部</div>
            </div>
        </div>
    </div>
</div>

<div class="legend">
    <span class="legend-title">层级：</span>
    <div class="legend-item level-0"><div class="legend-color"></div>1级</div>
    <div class="legend-item level-1"><div class="legend-color"></div>2级</div>
    <div class="legend-item level-2"><div class="legend-color"></div>3级</div>
    <div class="legend-item level-3"><div class="legend-color"></div>4级</div>
    <div class="legend-item level-4"><div class="legend-color"></div>深层</div>
</div>

<div class="tree-container" id="treeWrap">
    <div class="empty-tip">暂无任务，点右上角「+」新增或导入</div>
</div>

<!-- 新增顶层任务弹窗 -->
<div class="modal-mask" id="addTopModal">
    <div class="modal-box">
        <div class="modal-title">新增顶层任务</div>
        <label class="modal-label">任务名称</label>
        <input type="text" class="modal-input" id="addTopInput" placeholder="输入顶层大项目名称">
        <label class="modal-label">截止日期（可选）</label>
        <div class="modal-date-row">
            <input type="date" id="addTopDate">
            <button class="btn-clear-date" id="clearAddDate">清除</button>
        </div>
        <div class="modal-btns">
            <button class="btn btn-default" id="addTopCancel">取消</button>
            <button class="btn btn-primary" id="addTopConfirm">添加</button>
        </div>
    </div>
</div>

<!-- 批量导入弹窗 -->
<div class="modal-mask" id="importModal">
    <div class="modal-box">
        <div class="modal-title">批量导入树形文本</div>
        <div class="modal-tip">
            粘贴标准树形格式，自动识别日期和层级：<br>
            顶层任务：项目名称<br>
            ├─ 子任务1｜2026-06-23：任务内容<br>
            │  ├─ 细分：子任务内容
        </div>
        <textarea class="modal-textarea" id="importTextarea" placeholder="粘贴树形格式内容..."></textarea>
        <div class="modal-btns">
            <button class="btn btn-default" id="importCancel">取消</button>
            <button class="btn btn-primary" id="importConfirm">解析导入</button>
        </div>
    </div>
</div>

<!-- 修改任务弹窗 -->
<div class="modal-mask" id="editModal">
    <div class="modal-box">
        <div class="modal-title">修改任务</div>
        <label class="modal-label">任务名称</label>
        <input type="text" class="modal-input" id="editNameInput" placeholder="任务内容">
        <label class="modal-label">截止日期（可选）</label>
        <div class="modal-date-row">
            <input type="date" id="editDateInput">
            <button class="btn-clear-date" id="clearEditDate">清除日期</button>
        </div>
        <div class="modal-tip" style="margin-top:8px">
            日期和任务名分开编辑，保存后自动组合为【日期】任务名格式
        </div>
        <div class="modal-btns">
            <button class="btn btn-default" id="editCancel">取消</button>
            <button class="btn btn-primary" id="editConfirm">保存</button>
        </div>
    </div>
</div>

<script>
let taskTree = JSON.parse(localStorage.getItem("treeTodo_final")) || [];
let hideDoneAll = false;
let hideLevels = {};
const treeWrap = document.getElementById("treeWrap");
let currentEditId = null;

// 获取今天日期 YYYY-MM-DD
function getTodayStr(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 提取日期和名称
function parseTaskText(fullText){
    if(!fullText) return { date: "", name: "" };
    const m = fullText.match(/^【(\d{4}-\d{2}-\d{2})】(.*)$/);
    if(m){
        return { date: m[1], name: m[2] };
    }
    return { date: "", name: fullText };
}

// 组合日期和名称
function combineTaskText(date, name){
    if(date) return `【${date}】${name}`;
    return name;
}

// 判断单个任务是否逾期
function isOverdue(node){
    if(!node || node.checked) return false;
    const {date} = parseTaskText(node.text);
    if(!date) return false;
    return date < getTodayStr();
}

// 判断节点下是否有逾期子任务（递归所有层级）
function hasOverdueChild(node){
    if(!node.children || node.children.length === 0) return false;
    for(let child of node.children){
        if(isOverdue(child)) return true;
        if(hasOverdueChild(child)) return true;
    }
    return false;
}

function saveData(){
    localStorage.setItem("treeTodo_final", JSON.stringify(taskTree));
}
function genId(){
    return Date.now() + Math.random().toString(36).slice(2);
}

// 解析树形导入文本
function parseTreeText(rawText){
    const lines = rawText.split(/\r?\n/).map(s=>s.trim()).filter(s=>s);
    let rootItem = null;
    const levelStack = [];

    for(let line of lines){
        if(line.startsWith("顶层任务：")){
            const title = line.replace("顶层任务：","").trim();
            rootItem = {id:genId(),text:title,checked:false,indeterminate:false,collapsed:false,children:[]};
            levelStack.length = 0;
            levelStack.push({level:0,node:rootItem});
            continue;
        }
        const cleanLine = line.replace(/[├└│─ ]/g,"").trim();
        let textContent = cleanLine;
        let dateStr = "";
        if(cleanLine.includes("｜")){
            const sp = cleanLine.split("｜");
            dateStr = sp[0].trim();
            textContent = sp.slice(1).join("｜").trim();
        }
        let finalText = textContent;
        if(dateStr && /^\d{4}-\d{2}-\d{2}$/.test(dateStr)){
            finalText = `【${dateStr}】${textContent}`;
        }

        let currentLevel = 0;
        if(line.match(/^(\s*[├└│])/)){
            const prefix = line.match(/^(\s*[├└│ ]+)/)[1];
            currentLevel = Math.floor(prefix.length / 2) + 1;
        }

        const newNode = {id:genId(),text:finalText,checked:false,indeterminate:false,collapsed:false,children:[]};
        while(levelStack.length && levelStack[levelStack.length-1].level >= currentLevel){
            levelStack.pop();
        }
        const parent = levelStack[levelStack.length-1].node;
        if(!parent.children) parent.children = [];
        parent.children.push(newNode);
        levelStack.push({level:currentLevel,node:newNode});
    }
    return rootItem;
}

// 进度计算
function calcProgress(node){
    let total = 0, done = 0;
    function loop(n){
        if(!n.children || n.children.length === 0){
            total++;
            if(n.checked) done++;
            return;
        }
        n.children.forEach(c=>loop(c));
    }
    loop(node);
    return {total, done, rate: total===0 ? 0 : (done/total*100).toFixed(0)};
}

function updateParentCheck(parentNode){
    if(!parentNode) return;
    const childStates = parentNode.children.map(c=>c.checked);
    const allTrue = childStates.every(s=>s===true);
    const allFalse = childStates.every(s=>s===false);
    parentNode.checked = allTrue;
    parentNode.indeterminate = !allTrue && !allFalse;
    saveData();
}

function toggleCheck(node){
    node.checked = !node.checked;
    node.indeterminate = false;
    function setChild(n, val){
        n.checked = val;
        n.indeterminate = false;
        if(n.children) n.children.forEach(c=>setChild(c, val));
    }
    setChild(node, node.checked);

    function findParent(list, target){
        for(let item of list){
            if(item.children?.includes(target)) return item;
            if(item.children){
                const p = findParent(item.children, target);
                if(p) return p;
            }
        }
        return null;
    }
    let p = findParent(taskTree, node);
    while(p){
        updateParentCheck(p);
        p = findParent(taskTree, p);
    }
    renderTree();
}

function findNode(list, targetId){
    for(let n of list){
        if(n.id === targetId) return n;
        if(n.children){
            const res = findNode(n.children, targetId);
            if(res) return res;
        }
    }
    return null;
}

function shouldHide(node, level){
    if(hideDoneAll && node.checked) return true;
    if(hideLevels[level] && node.checked) return true;
    return false;
}

// 删除节点函数
function deleteNode(list, targetId){
    for(let i=0;i<list.length;i++){
        if(list[i].id === targetId){
            list.splice(i,1);
            return true;
        }
        if(list[i].children && deleteNode(list[i].children, targetId)) return true;
    }
    return false;
}

// 渲染节点
function renderNode(node, level){
    const levelCls = `level-${Math.min(level, 4)}`;
    const {total, done, rate} = calcProgress(node);
    let cls = "";
    if(node.checked) cls = "completed";
    else if(node.indeterminate) cls = "indeterminate";

    if(shouldHide(node, level)){
        return "";
    }

    const hasChildren = total > 0;
    const arrowCls = hasChildren ? (node.collapsed ? "collapsed" : "") : "empty";
    const childrenCls = node.collapsed ? "collapsed" : "";

    const overdue = isOverdue(node);
    const childOverdue = hasOverdueChild(node);

    // 逾期文字样式
    if(overdue) cls += " overdue-text";

    const {date, name} = parseTaskText(node.text);
    const dateTagHtml = date 
        ? `<span class="date-tag ${overdue ? 'overdue' : ''}" data-action="editDate" data-id="${node.id}">${date}</span>` 
        : '';
    
    // 父任务有子任务逾期且自身没日期 → 显示感叹号
    const overdueIconHtml = (childOverdue && !date) 
        ? '<span class="overdue-icon" title="有子任务已逾期">!</span>' 
        : '';

    let html = `
    <div class="tree-item ${levelCls} ${cls}" data-id="${node.id}" data-level="${level}">
        <div class="task-main" data-id="${node.id}">
            <span class="toggle-arrow ${arrowCls}" data-action="toggle" data-id="${node.id}">▼</span>
            <input type="checkbox" ${node.checked ? "checked" : ""} data-action="check" data-id="${node.id}" class="check-box">
            <span class="task-text" data-action="edit" data-id="${node.id}">${name}</span>
            ${dateTagHtml}
            ${overdueIconHtml}
            <button class="more-btn" data-action="more" data-id="${node.id}" title="更多操作">⋯</button>
        </div>
        <div class="task-actions" data-parent="${node.id}">
            <button class="btn btn-add" data-action="add" data-id="${node.id}">添加</button>
            <button class="btn btn-edit" data-action="edit" data-id="${node.id}">修改</button>
            <button class="btn btn-del" data-action="delete" data-id="${node.id}">删除</button>
        </div>
    `;
    if(hasChildren){
        html += `
        <div class="progress-wrap">
            <div class="progress-bar" style="width:${rate}%"></div>
        </div>
        <div class="children-wrap ${childrenCls}" data-parent="${node.id}">
        `;
        node.children.forEach(child=>{
            html += renderNode(child, level+1);
        });
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

function renderTree(){
    if(taskTree.length === 0){
        treeWrap.innerHTML = `<div class="empty-tip">暂无任务，点右上角「+」新增或导入</div>`;
        return;
    }
    let allHtml = "";
    taskTree.forEach(item=>{
        allHtml += renderNode(item, 0);
    });
    
    if(!allHtml){
        treeWrap.innerHTML = `<div class="empty-tip">当前无显示任务（已完成任务已隐藏）</div>`;
        return;
    }
    
    treeWrap.innerHTML = allHtml;

    // 修复复选框半选状态
    document.querySelectorAll('.check-box').forEach(cb=>{
        const id = cb.dataset.id;
        const node = findNode(taskTree, id);
        if(node && node.indeterminate){
            cb.indeterminate = true;
        }
    });
}

// ========== 事件委托（统一处理所有点击）==========
treeWrap.addEventListener('click', function(e){
    const target = e.target;
    
    // 获取最接近的带有 data-action 的元素
    const actionEl = target.closest('[data-action]');
    if(!actionEl) return;
    
    const action = actionEl.dataset.action;
    const id = actionEl.dataset.id;
    
    if(!action || !id) return;
    e.stopPropagation();

    const node = findNode(taskTree, id);
    if(!node) return;

    switch(action){
        // 折叠展开
        case 'toggle':
            if(actionEl.classList.contains('empty')) return;
            node.collapsed = !node.collapsed;
            saveData();
            renderTree();
            break;

        // 勾选
        case 'check':
            toggleCheck(node);
            break;

        // 打开修改弹窗
        case 'edit':
        case 'editDate':
            openEditModal(id);
            break;

        // 更多按钮：展开/收起操作栏
        case 'more':
            const actionBar = document.querySelector(`.task-actions[data-parent="${id}"]`);
            if(actionBar) {
                // 关闭其他所有展开的操作栏
                document.querySelectorAll('.task-actions.show').forEach(bar => {
                    if(bar.dataset.parent !== id) {
                        bar.classList.remove('show');
                    }
                });
                actionBar.classList.toggle('show');
            }
            break;

        // 添加子任务
        case 'add':
            const childText = prompt("输入子步骤内容：");
            if(!childText?.trim()) return;
            const newChild = {
                id: genId(),
                text: childText.trim(),
                checked: false,
                indeterminate: false,
                collapsed: false,
                children: []
            };
            if(!node.children) node.children = [];
            node.children.push(newChild);
            // 自动展开父节点
            node.collapsed = false;
            saveData();
            renderTree();
            break;

        // 删除任务
        case 'delete':
            if(!confirm("确定删除该任务及其所有子任务吗？")) return;
            deleteNode(taskTree, id);
            saveData();
            renderTree();
            break;
    }
});

// 双击任务行打开修改弹窗
treeWrap.addEventListener('dblclick', function(e){
    const taskMain = e.target.closest('.task-main');
    if(!taskMain) return;
    const id = taskMain.dataset.id;
    if(!id) return;
    e.stopPropagation();
    openEditModal(id);
});

// 打开修改弹窗
function openEditModal(id){
    currentEditId = id;
    const node = findNode(taskTree, currentEditId);
    if(!node) return;
    const {date, name} = parseTaskText(node.text);
    document.getElementById("editNameInput").value = name;
    document.getElementById("editDateInput").value = date || "";
    document.getElementById("editModal").style.display = "flex";
}

// ========== 顶部菜单 ==========
const menuBtn = document.getElementById("menuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");

menuBtn.onclick = function(e){
    e.stopPropagation();
    dropdownMenu.classList.toggle("show");
}
document.addEventListener("click", function(){
    dropdownMenu.classList.remove("show");
    document.getElementById("hideSubmenu").classList.remove("show");
})
dropdownMenu.onclick = function(e){
    e.stopPropagation();
}

document.getElementById("menuHideLevel").onclick = function(e){
    e.stopPropagation();
    document.getElementById("hideSubmenu").classList.toggle("show");
}

document.querySelectorAll(".hide-submenu .menu-item[data-hidelevel]").forEach(item=>{
    item.onclick = function(e){
        e.stopPropagation();
        const lv = parseInt(this.dataset.hidelevel);
        hideLevels[lv] = !hideLevels[lv];
        this.style.background = hideLevels[lv] ? '#e6f7ff' : '';
        this.style.color = hideLevels[lv] ? '#409eff' : '';
        renderTree();
    }
})

document.getElementById("showAllBtn").onclick = function(e){
    e.stopPropagation();
    hideDoneAll = false;
    hideLevels = {};
    document.getElementById("hideDoneBtn").classList.remove("active");
    document.querySelectorAll(".hide-submenu .menu-item[data-hidelevel]").forEach(item=>{
        item.style.background = '';
        item.style.color = '';
    });
    dropdownMenu.classList.remove("show");
    document.getElementById("hideSubmenu").classList.remove("show");
    renderTree();
}

document.getElementById("hideDoneBtn").onclick = function(){
    hideDoneAll = !hideDoneAll;
    this.classList.toggle("active");
    renderTree();
}

// 新增顶层
document.getElementById("menuAddTop").onclick = function(){
    dropdownMenu.classList.remove("show");
    document.getElementById("addTopInput").value = "";
    document.getElementById("addTopDate").value = "";
    document.getElementById("addTopModal").style.display = "flex";
    document.getElementById("addTopInput").focus();
}
document.getElementById("addTopCancel").onclick = function(){
    document.getElementById("addTopModal").style.display = "none";
}
document.getElementById("clearAddDate").onclick = function(){
    document.getElementById("addTopDate").value = "";
}
document.getElementById("addTopConfirm").onclick = function(){
    const name = document.getElementById("addTopInput").value.trim();
    const date = document.getElementById("addTopDate").value;
    if(!name){alert("请输入项目名称");return}
    const fullText = combineTaskText(date, name);
    taskTree.push({
        id: genId(),
        text: fullText,
        checked: false,
        indeterminate: false,
        collapsed: false,
        children: []
    })
    document.getElementById("addTopModal").style.display = "none";
    saveData();
    renderTree();
}

// 批量导入
document.getElementById("menuImport").onclick = function(){
    dropdownMenu.classList.remove("show");
    document.getElementById("importTextarea").value = "";
    document.getElementById("importModal").style.display = "flex";
}
document.getElementById("importCancel").onclick = function(){
    document.getElementById("importModal").style.display = "none";
}
document.getElementById("importConfirm").onclick = function(){
    const txt = document.getElementById("importTextarea").value.trim();
    if(!txt){alert("请粘贴树形任务文本再导入");return}
    const root = parseTreeText(txt);
    if(!root){alert("解析失败，请使用标准格式");return}
    taskTree.push(root);
    document.getElementById("importModal").style.display = "none";
    saveData();
    renderTree();
    alert("导入成功！");
}

// 修改弹窗
document.getElementById("editCancel").onclick = function(){
    document.getElementById("editModal").style.display = "none";
    currentEditId = null;
}
document.getElementById("clearEditDate").onclick = function(){
    document.getElementById("editDateInput").value = "";
}
document.getElementById("editConfirm").onclick = function(){
    const name = document.getElementById("editNameInput").value.trim();
    const date = document.getElementById("editDateInput").value;
    if(!name){alert("任务名称不能为空");return}
    const node = findNode(taskTree, currentEditId);
    if(!node) return;
    node.text = combineTaskText(date, name);
    saveData();
    renderTree();
    document.getElementById("editModal").style.display = "none";
    currentEditId = null;
}

document.getElementById("addTopInput").onkeydown = e=>{
    if(e.key === "Enter") document.getElementById("addTopConfirm").click();
}

// 初始化
renderTree();
</script>
