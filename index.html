<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI 分析工作站 (Pro)</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    :root {
      --primary-color: #000000;
      --primary-hover: #333333;
      --bg-color: #f7f7f8;
      --surface-color: #ffffff;
      --sidebar-bg: #ececf1;
      --sidebar-hover: #d9d9e3;
      --text-main: #0d0d0d;
      --text-secondary: #666666;
      --border-color: #e5e5e5;
      --chat-user-bg: #f3f4f6;
      --chat-user-text: #0d0d0d;
      --danger-color: #ef4444;
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      
      --sidebar-width: 280px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior-y: none;
    }

    /* --- 整体布局 --- */
    .app-layout {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* --- 左侧边栏 --- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20;
    }

    .sidebar-header { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    
    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-btn:hover { background: var(--sidebar-hover); }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: #e1e1e8;
      font-size: 13px;
      outline: none;
    }
    .search-box input:focus { border-color: #bfbfbf; background: #fff; }
    .search-box i { position: absolute; left: 10px; color: var(--text-secondary); width: 16px; height: 16px; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      color: var(--text-main);
      transition: background 0.2s;
      position: relative;
    }
    .session-item:hover { background: var(--sidebar-hover); }
    .session-item.active { background: #e1e1e8; font-weight: 500; }
    .session-item .title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .del-session-btn {
      display: none;
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; padding: 4px;
    }
    .session-item:hover .del-session-btn { display: block; }
    .session-item .del-session-btn:hover { color: var(--danger-color); }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border-color); }
    .settings-btn {
      display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px;
      background: none; border: none; border-radius: var(--radius-sm);
      color: var(--text-main); font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .settings-btn:hover { background: var(--sidebar-hover); }

    /* --- 主内容区 --- */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface-color);
      min-width: 0;
      position: relative;
    }

    /* 遮罩层 (移动端用) */
    .sidebar-overlay {
      display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 15; opacity: 0; transition: opacity 0.3s;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-md); }
      .sidebar.open ~ .sidebar-overlay { display: block; opacity: 1; }
    }

    /* 顶部导航 */
    .header {
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .menu-btn { background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; }
    @media (min-width: 769px) { .menu-btn { display: none; } } /* PC端隐藏菜单按钮 */

    .provider-badge {
      display: flex; align-items: center; gap: 6px;
      background: #f0f0f0; padding: 4px 12px; border-radius: var(--radius-full);
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    
    .header-actions { display: flex; align-items: center; gap: 8px; }
    
    .toggle-btn {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border-color);
      padding: 4px 10px; border-radius: var(--radius-full);
      font-size: 12px; color: var(--text-secondary); cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn.active { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }

    /* 聊天区 */
    .chat-container {
      flex: 1; overflow-y: auto; padding: 24px 16px;
      display: flex; flex-direction: column; gap: 24px;
      scroll-behavior: smooth;
    }
    .chat-inner { max-width: 800px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 24px; }

    .message { display: flex; flex-direction: column; max-width: 100%; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      padding: 12px 16px; font-size: 15px; line-height: 1.6; word-break: break-word;
      max-width: 85%;
    }
    .message.user .bubble {
      background: var(--chat-user-bg); color: var(--chat-user-text);
      border-radius: 16px 16px 4px 16px;
    }
    .message.assistant .bubble {
      background: transparent; color: var(--text-main); max-width: 100%; padding: 0;
    }

    /* 思考过程 (Deep Thinking) */
    .reasoning-box {
      background: #f8f9fa; border-left: 4px solid #cbd5e1;
      padding: 12px 16px; margin-bottom: 12px; border-radius: 0 8px 8px 0;
      font-size: 14px; color: #64748b;
    }
    .reasoning-box summary { cursor: pointer; font-weight: 500; outline: none; margin-bottom: 8px; user-select: none; }
    .reasoning-content { white-space: pre-wrap; font-family: inherit; }

    /* 图片预览 */
    .msg-image { max-width: 300px; max-height: 300px; border-radius: var(--radius-sm); margin-top: 8px; object-fit: cover; }

    /* Markdown 美化 */
    .markdown-body pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: var(--radius-md); overflow-x: auto; margin: 12px 0; font-size: 13px; font-family: monospace; }
    .markdown-body code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; color: #ef4444; }
    .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
    .markdown-body p { margin-bottom: 12px; }
    .markdown-body p:last-child { margin-bottom: 0; }
    .markdown-body ul, .markdown-body ol { margin-left: 20px; margin-bottom: 12px; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--border-color); padding: 8px; }
    
    .cursor-blink::after { content: '▋'; display: inline-block; animation: blink 1s step-end infinite; color: var(--text-secondary); margin-left: 4px; }
    @keyframes blink { 50% { opacity: 0; } }

    /* 输入区 */
    .input-wrapper-outer {
      padding: 0 16px 16px 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      max-width: 832px; margin: 0 auto; width: 100%;
      background: var(--surface-color);
    }

    /* 附件预览区 */
    .attachment-preview {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .preview-item {
      position: relative; display: flex; align-items: center; background: #f3f4f6;
      padding: 4px 8px; border-radius: var(--radius-sm); font-size: 12px;
      border: 1px solid var(--border-color);
    }
    .preview-item img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; margin-right: 6px; }
    .preview-item .rm-btn {
      position: absolute; top: -6px; right: -6px; background: #fff; border: 1px solid #ddd;
      border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 10px; color: red;
    }

    .input-box {
      background: #f4f4f5; border: 1px solid transparent; border-radius: 24px;
      display: flex; align-items: flex-end; padding: 8px 12px;
      transition: all 0.2s; box-shadow: var(--shadow-sm);
    }
    .input-box:focus-within { background: #fff; border-color: #d1d5db; box-shadow: var(--shadow-md); }

    .tool-btn {
      background: transparent; border: none; color: var(--text-secondary);
      width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0; margin-bottom: 2px;
    }
    .tool-btn:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
    .tool-btn input[type="file"] { display: none; }

    textarea {
      flex: 1; background: transparent; border: none; padding: 10px 8px; font-size: 15px; line-height: 1.5;
      resize: none; outline: none; max-height: 150px; min-height: 40px; color: var(--text-main); font-family: inherit;
    }
    textarea::placeholder { color: #9ca3af; }

    .send-btn {
      background: var(--primary-color); color: white; border: none;
      width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
      cursor: pointer; flex-shrink: 0; margin-bottom: 2px; transition: transform 0.1s, opacity 0.2s;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }

    /* Gemini ✨ 动画 */
    @keyframes sparklePulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .enhancing { animation: sparklePulse 1s infinite; pointer-events: none; }
    .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 弹窗通用 */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 100;
      justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s;
    }
    .modal.active { display: flex; opacity: 1; }
    .modal-content {
      background: var(--surface-color); width: 90%; max-width: 500px;
      border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; gap: 16px;
      max-height: 85vh; overflow-y: auto;
    }
    @media (max-width: 600px) {
      .modal { align-items: flex-end; }
      .modal-content { width: 100%; max-width: 100%; border-radius: 24px 24px 0 0; padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
    
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .form-group label { font-size: 13px; font-weight: 600; color: var(--text-main); }
    .form-control { padding: 10px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 14px; background: #fafafa; width: 100%; }
    .form-control:focus { outline: none; border-color: #999; background: #fff; }
    
    .provider-tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #f3f4f6; padding: 4px; border-radius: var(--radius-md); }
    .provider-tab { flex: 1; padding: 8px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: var(--radius-sm); color: var(--text-secondary); transition: all 0.2s; }
    .provider-tab.active { background: #fff; color: var(--text-main); box-shadow: var(--shadow-sm); }

    .btn-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 16px; }
    .btn { padding: 10px 20px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: var(--primary-color); color: #fff; }
    .btn-secondary { background: #f3f4f6; color: var(--text-main); }

    /* 技能库列表样式 */
    .skill-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding-right: 4px; margin: 12px 0; }
    .skill-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: #f9fafb; border-radius: var(--radius-sm); border: 1px solid var(--border-color); transition: all 0.2s; }
    .skill-item.active { border-color: #000; background: #f3f4f6; }
    .skill-item input[type="checkbox"] { margin-top: 4px; accent-color: #000; width: 16px; height: 16px; cursor: pointer; }
    .skill-info { flex: 1; overflow: hidden; }
    .skill-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-main); }
    .skill-desc { font-size: 12px; color: var(--text-secondary); word-break: break-all; }
    .del-btn { background: none; border: none; color: var(--danger-color); cursor: pointer; padding: 4px; opacity: 0.6; display: flex; align-items: center; justify-content: center;}
    .del-btn:hover { opacity: 1; background: rgba(239, 68, 68, 0.1); border-radius: 50%; }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }
  </style>
</head>
<body>
  <div class="app-layout">
    
    <!-- 左侧边栏 -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <span>新建对话</span>
          <i data-lucide="square-pen" width="18" height="18"></i>
        </button>
        <div class="search-box">
          <i data-lucide="search"></i>
          <input type="text" id="searchInput" placeholder="搜索历史对话...">
        </div>
      </div>
      
      <div class="session-list" id="sessionList">
        <!-- 动态渲染对话列表 -->
      </div>
      
      <div class="sidebar-footer">
        <button class="settings-btn" id="settingsBtn">
          <i data-lucide="settings" width="18" height="18"></i>
          设置 & 模型
        </button>
      </div>
    </div>
    
    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 顶部导航 -->
      <div class="header">
        <div class="header-left">
          <button class="menu-btn" id="menuBtn"><i data-lucide="menu" width="24" height="24"></i></button>
          <div class="provider-badge" id="currentProviderBadge" onclick="document.getElementById('settingsBtn').click()">
            <i data-lucide="sparkles" width="14" height="14"></i>
            <span id="providerNameText">MiMo</span>
          </div>
        </div>
        
        <!-- 高级功能开关 -->
        <div class="header-actions">
          <button class="toggle-btn" id="toggleSearch" title="联网搜索 (需API支持)">
            <i data-lucide="globe" width="14" height="14"></i> 联网
          </button>
          <button class="toggle-btn" id="toggleThink" title="深度思考 (需模型支持)">
            <i data-lucide="brain" width="14" height="14"></i> 思考
          </button>
        </div>
      </div>

      <!-- 聊天区域 -->
      <div class="chat-container" id="chatContainer">
        <div class="chat-inner" id="chatInner">
          <!-- 消息渲染区 -->
        </div>
      </div>

      <!-- 输入区域 -->
      <div class="input-wrapper-outer">
        <!-- 附件预览 -->
        <div class="attachment-preview" id="attachmentPreview"></div>
        
        <div class="input-box">
          <label class="tool-btn" title="选择上传图片或文档">
            <i data-lucide="paperclip" width="20" height="20"></i>
            <!-- 为了兼容夸克等国产手机浏览器，将 accept 属性改为宽容度极高的通配符，由底层 JS 自主识别文件后缀 -->
            <input type="file" id="fileInput" accept="*/*">
          </label>
          <button class="tool-btn" id="skillBtn" title="技能预设">
            <i data-lucide="blocks" width="20" height="20"></i>
          </button>
          
          <button class="tool-btn" id="enhancePromptBtn" title="✨ 使用当前模型智能润色提示词" disabled>✨</button>
          
          <textarea id="userInput" rows="1" placeholder="发送消息 (Shift+Enter 换行)..."></textarea>
          
          <button class="send-btn" id="sendBtn" disabled>
            <i data-lucide="arrow-up" stroke-width="3" width="20" height="20"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- 设置与模型弹窗 -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3><i data-lucide="sliders-horizontal" width="20" height="20"></i> 模型配置</h3>
          <button class="tool-btn" id="closeSettingsModal" style="margin:0"><i data-lucide="x" width="20" height="20"></i></button>
        </div>
        
        <!-- 服务商切换 Tab -->
        <div class="provider-tabs" id="providerTabs">
          <div class="provider-tab" data-provider="mimo">小米 MiMo</div>
          <div class="provider-tab" data-provider="deepseek">DeepSeek</div>
          <div class="provider-tab" data-provider="custom">自定义 (兼容)</div>
        </div>

        <div id="settingsForm">
          <!-- 动态渲染选中的服务商表单 -->
        </div>
        
        <div class="btn-row">
          <button class="btn btn-primary" id="saveSettingsBtn">保存并切换</button>
        </div>
      </div>
    </div>

    <!-- 技能预设弹窗 -->
    <div class="modal" id="skillModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3><i data-lucide="blocks" width="20" height="20"></i> 技能预设库</h3>
          <button class="tool-btn" id="closeSkillModal" style="margin:0"><i data-lucide="x" width="20" height="20"></i></button>
        </div>
        
        <p style="font-size: 13px; color: var(--text-secondary);">勾选需要的 Prompt，系统会自动将其作为前置指令附加到你的消息中。</p>
        
        <div class="skill-list" id="skillListContainer">
          <!-- 动态渲染 -->
        </div>
        
        <div class="form-group">
          <label>添加新技能</label>
          <input type="text" class="form-control" id="newSkillName" placeholder="技能名称，如：翻译专家" style="margin-bottom: 8px;">
          <textarea class="form-control" id="newSkillContent" placeholder="输入 Prompt 模板，如：请将以下内容翻译为英文..." style="min-height: 60px; resize: vertical;"></textarea>
        </div>
        
        <div class="btn-row">
          <button class="btn btn-primary" id="addSkillBtn">添加新技能</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ===== 预设模型库 =====
    const PREDEFINED_MODELS = {
      mimo: {
        text: ['mimo-v2.5', 'mimo-v2-omni', 'mimo-v2-flash', 'mimo-chat'],
        vision: ['mimo-v2.5', 'mimo-v2-omni', 'mimo-vision']
      },
      deepseek: {
        text: ['deepseek-chat', 'deepseek-reasoner', 'deepseek-coder'],
        vision: []
      },
      custom: { text: [], vision: [] }
    };

    // ===== 核心状态管理 =====
    const STATE = {
      sessions: [], // { id, title, messages: [{role, content, file, skillPrefix, reasoning}], updatedAt }
      currentSessionId: null,
      settings: {
        activeProvider: 'mimo',
        enableSearch: false,
        enableThink: false,
        providers: {
          mimo: {
            apiKey: '',
            baseUrl: 'https://mimo.mi.com/v1',
            model: 'mimo-v2.5',
            visionModel: 'mimo-v2-omni'
          },
          deepseek: {
            apiKey: '',
            baseUrl: 'https://api.deepseek.com/v1/chat/completions',
            model: 'deepseek-chat',
            visionModel: ''
          },
          custom: {
            apiKey: '',
            baseUrl: '',
            model: '',
            visionModel: ''
          }
        }
      },
      pendingFile: { type: null, data: null, name: null },
      skills: [],
      activeSkillIds: []
    };

    // ===== DOM 元素 =====
    const DOM = {
      sidebar: document.getElementById('sidebar'),
      sidebarOverlay: document.getElementById('sidebarOverlay'),
      menuBtn: document.getElementById('menuBtn'),
      newChatBtn: document.getElementById('newChatBtn'),
      sessionList: document.getElementById('sessionList'),
      searchInput: document.getElementById('searchInput'),
      
      providerNameText: document.getElementById('providerNameText'),
      toggleSearch: document.getElementById('toggleSearch'),
      toggleThink: document.getElementById('toggleThink'),
      
      chatContainer: document.getElementById('chatContainer'),
      chatInner: document.getElementById('chatInner'),
      
      userInput: document.getElementById('userInput'),
      enhancePromptBtn: document.getElementById('enhancePromptBtn'),
      sendBtn: document.getElementById('sendBtn'),
      fileInput: document.getElementById('fileInput'),
      attachmentPreview: document.getElementById('attachmentPreview'),
      
      settingsModal: document.getElementById('settingsModal'),
      settingsBtn: document.getElementById('settingsBtn'),
      closeSettingsModal: document.getElementById('closeSettingsModal'),
      providerTabs: document.getElementById('providerTabs'),
      settingsForm: document.getElementById('settingsForm'),
      saveSettingsBtn: document.getElementById('saveSettingsBtn'),

      skillBtn: document.getElementById('skillBtn'),
      skillModal: document.getElementById('skillModal'),
      closeSkillModal: document.getElementById('closeSkillModal'),
      skillListContainer: document.getElementById('skillListContainer'),
      newSkillName: document.getElementById('newSkillName'),
      newSkillContent: document.getElementById('newSkillContent'),
      addSkillBtn: document.getElementById('addSkillBtn')
    };

    // ===== 初始化与数据持久化 =====
    function init() {
      lucide.createIcons();
      loadData();
      renderSessions();
      if(STATE.sessions.length === 0) createNewSession();
      else loadSession(STATE.sessions[0].id);
      
      updateHeaderUI();
      bindEvents();
    }

    function loadData() {
      const savedSettings = localStorage.getItem('pro_ai_settings');
      if (savedSettings) STATE.settings = { ...STATE.settings, ...JSON.parse(savedSettings) };
      
      const savedSessions = localStorage.getItem('pro_ai_sessions');
      if (savedSessions) STATE.sessions = JSON.parse(savedSessions);

      const savedSkills = localStorage.getItem('pro_ai_skills');
      if (savedSkills) STATE.skills = JSON.parse(savedSkills);
      else {
        STATE.skills = [
          { id: '1', name: '文档总结', content: '请对以下内容进行总结，提取核心观点，并用 Markdown 列表呈现：' },
          { id: '2', name: '代码审查', content: '请作为资深工程师分析以下代码。指出潜在 Bug、性能问题，并提供优化后的代码示例：' },
          { id: '3', name: '中英互译', content: '请充当专业翻译。如果以下内容是中文，翻译为地道英文；如果是英文，翻译为流畅的中文：' }
        ];
        localStorage.setItem('pro_ai_skills', JSON.stringify(STATE.skills));
      }
      
      const savedActiveSkills = localStorage.getItem('pro_ai_active_skills');
      if (savedActiveSkills) STATE.activeSkillIds = JSON.parse(savedActiveSkills);
    }

    function saveData() {
      localStorage.setItem('pro_ai_settings', JSON.stringify(STATE.settings));
      const sessionsToSave = STATE.sessions.slice(0, 30).map(s => ({
        ...s,
        messages: s.messages.slice(-50)
      }));
      try {
        localStorage.setItem('pro_ai_sessions', JSON.stringify(sessionsToSave));
      } catch(e) {
        alert("存储空间不足，旧的对话或图片已被截断。");
      }
    }

    // ===== UI 与 侧边栏控制 =====
    function toggleSidebar() { DOM.sidebar.classList.toggle('open'); }
    function closeSidebar() { DOM.sidebar.classList.remove('open'); }

    // ===== 会话管理 =====
    function generateId() { return Date.now().toString() + Math.random().toString(36).substr(2, 5); }

    function createNewSession() {
      const newSession = {
        id: generateId(),
        title: '新对话',
        messages: [],
        updatedAt: Date.now()
      };
      STATE.sessions.unshift(newSession);
      loadSession(newSession.id);
      saveData();
    }

    function loadSession(id) {
      STATE.currentSessionId = id;
      renderSessions();
      renderChat();
      if(window.innerWidth <= 768) closeSidebar();
    }

    function deleteSession(id, e) {
      e.stopPropagation();
      STATE.sessions = STATE.sessions.filter(s => s.id !== id);
      if (STATE.currentSessionId === id) {
        if (STATE.sessions.length > 0) loadSession(STATE.sessions[0].id);
        else createNewSession();
      } else {
        renderSessions();
      }
      saveData();
    }

    function renderSessions(filterText = '') {
      DOM.sessionList.innerHTML = '';
      const text = filterText.toLowerCase();
      
      STATE.sessions.forEach(session => {
        let match = session.title.toLowerCase().includes(text);
        if (!match && text) {
          match = session.messages.some(m => m.content && m.content.toLowerCase().includes(text));
        }
        if (text && !match) return;

        const div = document.createElement('div');
        div.className = `session-item ${session.id === STATE.currentSessionId ? 'active' : ''}`;
        div.innerHTML = `
          <i data-lucide="message-square" width="16" height="16"></i>
          <span class="title">${escapeHtml(session.title)}</span>
          <button class="del-session-btn" title="删除"><i data-lucide="trash-2" width="16" height="16"></i></button>
        `;
        div.onclick = () => loadSession(session.id);
        div.querySelector('.del-session-btn').onclick = (e) => deleteSession(session.id, e);
        DOM.sessionList.appendChild(div);
      });
      lucide.createIcons({ root: DOM.sessionList });
    }

    function updateSessionTitle(id, newTitle) {
      const session = STATE.sessions.find(s => s.id === id);
      if (session && session.title === '新对话') {
        session.title = newTitle.slice(0, 15) + (newTitle.length > 15 ? '...' : '');
        renderSessions();
        saveData();
      }
    }

    // ===== 聊天渲染 =====
    function renderChat() {
      DOM.chatInner.innerHTML = '';
      const session = STATE.sessions.find(s => s.id === STATE.currentSessionId);
      if (!session || session.messages.length === 0) {
        const welcome = document.createElement('div');
        welcome.className = 'message assistant';
        welcome.innerHTML = `<div class="bubble markdown-body"><p>你好！我是 AI 分析工作站。<br>你可以进行文本对话，或者点击左下角上传图片/文档进行<strong>智能分析</strong>。顶部支持切换<strong>联网搜索</strong>和<strong>深度思考</strong>能力。</p></div>`;
        DOM.chatInner.appendChild(welcome);
        return;
      }

      session.messages.forEach(msg => {
        if (msg.role === 'user') {
          let fileObj = msg.file;
          if (!fileObj && msg.imgBase64) fileObj = { type: 'image', data: msg.imgBase64 };
          appendUserMessageUI(msg.content, fileObj);
        }
        else appendAssistantMessageUI(msg.content, msg.reasoning);
      });
      scrollToBottom();
    }

    function appendUserMessageUI(text, fileObj = null) {
      const div = document.createElement('div');
      div.className = 'message user';
      let html = `<div class="bubble">${escapeHtml(text)}</div>`;
      
      if (fileObj) {
        if (fileObj.type === 'image') {
          html += `<img src="${fileObj.data}" class="msg-image">`;
        } else if (fileObj.type === 'text') {
          html += `<div style="margin-top: 6px; padding: 6px 10px; background: rgba(0,0,0,0.05); border-radius: 6px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; align-self: flex-end; color: var(--text-secondary); border: 1px solid var(--border-color);"><i data-lucide="file-text" width="14" height="14"></i> 📎 附件: ${escapeHtml(fileObj.name)}</div>`;
        }
      }
      
      div.innerHTML = html;
      DOM.chatInner.appendChild(div);
      lucide.createIcons({ root: div });
      scrollToBottom();
    }

    function appendAssistantMessageUI(content, reasoning = null) {
      const div = document.createElement('div');
      div.className = 'message assistant';
      
      let html = '';
      if (reasoning) {
        html += `
          <details class="reasoning-box">
            <summary><i data-lucide="brain" width="14" height="14" style="vertical-align:-2px;margin-right:4px;"></i> 深度思考过程</summary>
            <div class="reasoning-content">${escapeHtml(reasoning)}</div>
          </details>
        `;
      }
      html += `<div class="bubble markdown-body">${marked.parse(content || '')}</div>`;
      
      div.innerHTML = html;
      lucide.createIcons({ root: div });
      DOM.chatInner.appendChild(div);
      scrollToBottom();
    }

    function createStreamingUI() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      
      const reasoningBox = document.createElement('details');
      reasoningBox.className = 'reasoning-box';
      reasoningBox.style.display = 'none';
      reasoningBox.innerHTML = `<summary><i data-lucide="brain" width="14" height="14" style="vertical-align:-2px;margin-right:4px;"></i> 思考中...</summary><div class="reasoning-content cursor-blink"></div>`;
      
      const contentBubble = document.createElement('div');
      contentBubble.className = 'bubble markdown-body cursor-blink';
      
      div.appendChild(reasoningBox);
      div.appendChild(contentBubble);
      DOM.chatInner.appendChild(div);
      lucide.createIcons({ root: div });
      scrollToBottom();

      let fullContent = '';
      let fullReasoning = '';
      let isReasoning = false;

      return {
        updateReasoning: (text) => {
          if (!isReasoning) {
            isReasoning = true;
            reasoningBox.style.display = 'block';
            reasoningBox.open = true;
          }
          fullReasoning += text;
          reasoningBox.querySelector('.reasoning-content').textContent = fullReasoning;
          scrollToBottom();
        },
        updateContent: (text) => {
          if (isReasoning) {
            isReasoning = false;
            reasoningBox.querySelector('.reasoning-content').classList.remove('cursor-blink');
            reasoningBox.open = false;
          }
          fullContent += text;
          contentBubble.innerHTML = marked.parse(fullContent);
          scrollToBottom();
        },
        finalize: () => {
          contentBubble.classList.remove('cursor-blink');
          if (reasoningBox.querySelector('.reasoning-content')) {
            reasoningBox.querySelector('.reasoning-content').classList.remove('cursor-blink');
            reasoningBox.querySelector('summary').innerHTML = `<i data-lucide="brain" width="14" height="14" style="vertical-align:-2px;margin-right:4px;"></i> 深度思考结束`;
            lucide.createIcons({ root: reasoningBox });
          }
          return { content: fullContent, reasoning: fullReasoning };
        },
        showError: (err) => {
          contentBubble.classList.remove('cursor-blink');
          contentBubble.innerHTML = `<span style="color:var(--danger-color)">❌ 请求失败: ${err}</span>`;
        }
      };
    }

    function scrollToBottom() {
      DOM.chatContainer.scrollTop = DOM.chatContainer.scrollHeight;
    }

    // ===== 附件与多模态处理 =====
    DOM.fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      try {
        const fileName = file.name.toLowerCase();
        // 智能检测后缀（国产手机端浏览器 file.type 在挑选特定格式文件时非常不可靠，必须辅以扩展名双重保障）
        const isImage = file.type.startsWith('image/') || /\.(jpg|jpeg|png|gif|webp|bmp)$/i.test(fileName);
        const isText = file.type.startsWith('text/') || /\.(txt|md|json|csv|py|js|html|css|xml|yaml|yml|log|c|cpp|h|java)$/i.test(fileName);

        if (isImage) {
          const base64 = await fileToBase64(file);
          STATE.pendingFile = { type: 'image', data: base64, name: file.name };
        } else if (isText) {
          const text = await file.text();
          STATE.pendingFile = { type: 'text', data: text, name: file.name };
        } else {
          // 如果是未知类型，默认尝试当作纯文本处理（兼容性最强）
          const text = await file.text();
          STATE.pendingFile = { type: 'text', data: text, name: file.name };
        }
        renderAttachmentPreview();
        checkInputState();
      } catch (err) {
        alert("文件读取失败: " + err.message);
      }
      DOM.fileInput.value = '';
    };

    function renderAttachmentPreview() {
      DOM.attachmentPreview.innerHTML = '';
      if (!STATE.pendingFile.data) return;
      
      const div = document.createElement('div');
      div.className = 'preview-item';
      if (STATE.pendingFile.type === 'image') {
        div.innerHTML = `<img src="${STATE.pendingFile.data}" alt="preview"> <span>${escapeHtml(STATE.pendingFile.name)}</span>`;
      } else {
        div.innerHTML = `<i data-lucide="file-text" width="16" height="16" style="margin-right:4px"></i> <span>${escapeHtml(STATE.pendingFile.name)}</span>`;
      }
      
      const rmBtn = document.createElement('div');
      rmBtn.className = 'rm-btn';
      rmBtn.innerHTML = '✕';
      rmBtn.onclick = () => { STATE.pendingFile = { type: null, data: null, name: null }; renderAttachmentPreview(); checkInputState(); };
      
      div.appendChild(rmBtn);
      DOM.attachmentPreview.appendChild(div);
      lucide.createIcons({ root: DOM.attachmentPreview });
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // ===== 技能预设渲染 =====
    function renderSkills() {
      DOM.skillListContainer.innerHTML = '';
      STATE.skills.forEach(skill => {
        const isActive = STATE.activeSkillIds.includes(skill.id);
        const div = document.createElement('div');
        div.className = `skill-item ${isActive ? 'active' : ''}`;
        div.innerHTML = `
          <input type="checkbox" ${isActive ? 'checked' : ''} data-id="${skill.id}">
          <div class="skill-info">
            <div class="skill-title">${escapeHtml(skill.name)}</div>
            <div class="skill-desc" title="${escapeHtml(skill.content)}">${escapeHtml(skill.content)}</div>
          </div>
          <button class="del-btn" style="width:28px;height:28px" data-id="${skill.id}"><i data-lucide="trash-2" width="16" height="16"></i></button>
        `;
        DOM.skillListContainer.appendChild(div);
      });
      lucide.createIcons({ root: DOM.skillListContainer });

      DOM.skillListContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.onchange = (e) => {
          const id = e.target.dataset.id;
          if (e.target.checked) {
            if (!STATE.activeSkillIds.includes(id)) STATE.activeSkillIds.push(id);
          } else {
            STATE.activeSkillIds = STATE.activeSkillIds.filter(i => i !== id);
          }
          localStorage.setItem('pro_ai_active_skills', JSON.stringify(STATE.activeSkillIds));
          renderSkills();
        };
      });

      DOM.skillListContainer.querySelectorAll('.del-btn').forEach(btn => {
        btn.onclick = (e) => {
          const id = e.currentTarget.dataset.id;
          STATE.skills = STATE.skills.filter(s => s.id !== id);
          STATE.activeSkillIds = STATE.activeSkillIds.filter(i => i !== id);
          localStorage.setItem('pro_ai_skills', JSON.stringify(STATE.skills));
          localStorage.setItem('pro_ai_active_skills', JSON.stringify(STATE.activeSkillIds));
          renderSkills();
        };
      });
    }

    // ===== 核心 API 请求逻辑 =====
    async function sendMessage() {
      const text = DOM.userInput.value.trim();
      const hasAttachment = STATE.pendingFile.data !== null;
      if (!text && !hasAttachment) return;

      const session = STATE.sessions.find(s => s.id === STATE.currentSessionId);
      if (!session) return;

      let userMsgContent = text || (hasAttachment ? '请分析附件内容。' : '');
      let fileObj = hasAttachment ? { ...STATE.pendingFile } : null;

      // 提取活跃的技能 (仅仅作为隐藏的后台数据保存，不混入 UI 显示的 userMsgContent 中)
      let skillContentStr = STATE.activeSkillIds.map(id => STATE.skills.find(s => s.id === id)).filter(Boolean).map(s => s.content).join('\n\n');

      appendUserMessageUI(userMsgContent, fileObj);
      // 保存到会话历史时，将 skill 作为一个隐藏字段 skillPrefix 存起来
      session.messages.push({ role: 'user', content: userMsgContent, file: fileObj, skillPrefix: skillContentStr });
      if (session.messages.length === 1 && text) updateSessionTitle(session.id, text);
      
      DOM.userInput.value = '';
      DOM.userInput.style.height = '40px';
      STATE.pendingFile = { type: null, data: null, name: null };
      renderAttachmentPreview();
      checkInputState();
      
      const providerKey = STATE.settings.activeProvider;
      const config = STATE.settings.providers[providerKey];
      
      if (!config.apiKey) {
        appendAssistantMessageUI(`⚠️ 请先在设置中配置 **${providerKey.toUpperCase()}** 的 API Key。`);
        session.messages.pop();
        return;
      }

      DOM.sendBtn.disabled = true;
      const streamUI = createStreamingUI();

      try {
        const apiMessages = session.messages.slice(-10).map(m => {
          let mFile = m.file;
          // 向下兼容旧格式
          if (!mFile && m.imgBase64) mFile = { type: 'image', data: m.imgBase64 };

          let finalContent = m.content || "";

          // 如果该条消息包含隐藏的技能前缀，在发送给大模型前进行拼接
          if (m.skillPrefix) {
            finalContent = `【系统指令/预设技能要求】\n${m.skillPrefix}\n\n${finalContent}`;
          }

          if (m.role === 'user' && mFile) {
            if (mFile.type === 'image') {
              return {
                role: 'user',
                content: [
                  { type: "text", text: finalContent || "请描述这张图片" },
                  { type: "image_url", image_url: { url: mFile.data } }
                ]
              };
            } else if (mFile.type === 'text') {
              // 发送给大模型时，将文件内容与用户文本(以及技能前缀)拼接
              return {
                role: 'user',
                content: `【文件附件：${mFile.name}】\n${mFile.data}\n\n${finalContent}`
              };
            }
          }
          return { role: m.role, content: finalContent };
        });

        let targetModel = config.model;
        if (fileObj && fileObj.type === 'image' && config.visionModel) targetModel = config.visionModel;
        
        let payload = {
          model: targetModel,
          messages: [
            { role: "system", content: "你是一个专业的AI助手，请使用Markdown格式回答。" },
            ...apiMessages
          ],
          stream: true,
          temperature: 0.6
        };

        if (STATE.settings.enableSearch) {
          payload.tools = [{ type: "web_search", web_search: { enable: true } }];
        }
        if (STATE.settings.enableThink) {
          payload.reasoning_effort = "high"; 
          if (providerKey === 'deepseek') payload.model = 'deepseek-reasoner';
        }

        let url = config.baseUrl;
        if (!url.endsWith('/chat/completions')) url = url.replace(/\/+$/, '') + '/chat/completions';

        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${config.apiKey}`
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        if (!response.body || !response.body.getReader) {
          const data = await response.json();
          streamUI.updateContent(data.choices?.[0]?.message?.content || '');
          const result = streamUI.finalize();
          session.messages.push({ role: 'assistant', content: result.content, reasoning: result.reasoning });
          saveData();
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let done = false;
        let buffer = '';

        while (!done) {
          const { value, done: readerDone } = await reader.read();
          done = readerDone;
          if (value) {
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';
            
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                const dataStr = line.slice(6).trim();
                if (dataStr === '[DONE]') { done = true; break; }
                try {
                  const parsed = JSON.parse(dataStr);
                  const delta = parsed.choices?.[0]?.delta;
                  if (!delta) continue;

                  if (delta.reasoning_content) {
                    streamUI.updateReasoning(delta.reasoning_content);
                  } else if (delta.content) {
                    streamUI.updateContent(delta.content);
                  }
                } catch(e) {}
              }
            }
          }
        }

        const finalData = streamUI.finalize();
        session.messages.push({ role: 'assistant', content: finalData.content, reasoning: finalData.reasoning });
        session.updatedAt = Date.now();
        saveData();

      } catch (err) {
        streamUI.showError(err.message);
        session.messages.pop(); 
      } finally {
        checkInputState();
      }
    }


    // ===== 交互与事件绑定 =====
    function bindEvents() {
      DOM.menuBtn.onclick = toggleSidebar;
      DOM.sidebarOverlay.onclick = closeSidebar;
      DOM.newChatBtn.onclick = createNewSession;
      DOM.searchInput.addEventListener('input', (e) => renderSessions(e.target.value));

      DOM.userInput.addEventListener('input', () => {
        DOM.userInput.style.height = '40px';
        DOM.userInput.style.height = Math.min(DOM.userInput.scrollHeight, 150) + 'px';
        checkInputState();
      });
      DOM.userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          if (!DOM.sendBtn.disabled) sendMessage();
        }
      });
      DOM.sendBtn.onclick = sendMessage;

      DOM.toggleSearch.onclick = () => {
        STATE.settings.enableSearch = !STATE.settings.enableSearch;
        updateHeaderUI();
        saveData();
      };
      DOM.toggleThink.onclick = () => {
        STATE.settings.enableThink = !STATE.settings.enableThink;
        updateHeaderUI();
        saveData();
      };

      DOM.settingsBtn.onclick = () => {
        renderSettingsForm(STATE.settings.activeProvider);
        DOM.settingsModal.classList.add('active');
        if(window.innerWidth <= 768) closeSidebar();
      };
      DOM.closeSettingsModal.onclick = () => DOM.settingsModal.classList.remove('active');
      
      DOM.providerTabs.addEventListener('click', (e) => {
        if (e.target.classList.contains('provider-tab')) {
          const provider = e.target.dataset.provider;
          renderSettingsForm(provider);
        }
      });

      DOM.saveSettingsBtn.onclick = () => {
        const p = document.querySelector('.provider-tab.active').dataset.provider;
        STATE.settings.activeProvider = p;
        
        STATE.settings.providers[p].apiKey = document.getElementById('set-apikey').value.trim();
        STATE.settings.providers[p].baseUrl = document.getElementById('set-baseurl').value.trim();
        
        // 获取模型名称 (如果是自定义选项，则读取手动输入的值)
        const textSelect = document.getElementById('set-model-select');
        const textInput = document.getElementById('set-model-custom');
        STATE.settings.providers[p].model = (textSelect && textSelect.value === 'custom') ? textInput.value.trim() : textSelect.value;
        
        const visionSelect = document.getElementById('set-vision-select');
        const visionInput = document.getElementById('set-vision-custom');
        if (visionSelect) {
          STATE.settings.providers[p].visionModel = (visionSelect.value === 'custom') ? visionInput.value.trim() : visionSelect.value;
        }
        
        saveData();
        updateHeaderUI();
        DOM.settingsModal.classList.remove('active');
      };

      DOM.skillBtn.onclick = () => {
        renderSkills();
        DOM.skillModal.classList.add('active');
      };
      DOM.closeSkillModal.onclick = () => DOM.skillModal.classList.remove('active');
      
      DOM.addSkillBtn.onclick = () => {
        const name = DOM.newSkillName.value.trim();
        const content = DOM.newSkillContent.value.trim();
        if (!content) return;
        STATE.skills.push({ id: Date.now().toString(), name: name || '新技能', content });
        localStorage.setItem('pro_ai_skills', JSON.stringify(STATE.skills));
        DOM.newSkillName.value = '';
        DOM.newSkillContent.value = '';
        renderSkills();
      };

      DOM.enhancePromptBtn.onclick = handleEnhancePrompt;

      // 点击遮罩层关闭任何弹窗
      window.addEventListener('click', (e) => {
        if (e.target === DOM.settingsModal) DOM.settingsModal.classList.remove('active');
        if (e.target === DOM.skillModal) DOM.skillModal.classList.remove('active');
      });
    }

    function checkInputState() {
      const text = DOM.userInput.value.trim();
      const hasFile = STATE.pendingFile.data !== null;
      DOM.sendBtn.disabled = !(text || hasFile);
      if (DOM.enhancePromptBtn) DOM.enhancePromptBtn.disabled = !text;
    }

    function updateHeaderUI() {
      DOM.toggleSearch.classList.toggle('active', STATE.settings.enableSearch);
      DOM.toggleThink.classList.toggle('active', STATE.settings.enableThink);
      const nameMap = { mimo: 'MiMo', deepseek: 'DeepSeek', custom: 'Custom' };
      DOM.providerNameText.textContent = nameMap[STATE.settings.activeProvider] || 'AI';
    }

    // ===== 智能提示词润色功能 (调用当前模型) =====
    async function handleEnhancePrompt() {
      const text = DOM.userInput.value.trim();
      if (!text) return;

      const providerKey = STATE.settings.activeProvider;
      const config = STATE.settings.providers[providerKey];

      if (!config.apiKey) {
        alert(`请先在左下角设置中配置 ${providerKey.toUpperCase()} 的 API Key 才能使用润色功能。`);
        return;
      }

      DOM.enhancePromptBtn.classList.add('enhancing');
      DOM.userInput.disabled = true;

      try {
        let url = config.baseUrl;
        if (!url.endsWith('/chat/completions')) url = url.replace(/\/+$/, '') + '/chat/completions';

        const payload = {
          model: config.model,
          messages: [
            { role: "system", content: "你是一个专业的提示词（Prompt）优化专家。请将用户输入的简短或随意的文本，扩写、润色为结构清晰、表达专业、意图明确的高质量 AI 提示词。要求：直接返回优化后的结果文本，绝不要包含任何解释、前言、总结或客套话。" },
            { role: "user", content: text }
          ],
          stream: false, // 优化提示词使用非流式，一次性返回
          temperature: 0.6
        };

        const response = await fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${config.apiKey}`
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        const data = await response.json();
        const enhancedText = data.choices?.[0]?.message?.content?.trim();

        if (enhancedText) {
          DOM.userInput.value = enhancedText;
          // 重新计算输入框高度
          DOM.userInput.style.height = '40px';
          DOM.userInput.style.height = Math.min(DOM.userInput.scrollHeight, 150) + 'px';
        }
      } catch (err) {
        console.error("提示词润色失败:", err);
        alert("润色失败，请检查网络或模型配置：\n" + err.message);
      } finally {
        DOM.enhancePromptBtn.classList.remove('enhancing');
        DOM.userInput.disabled = false;
        DOM.userInput.focus();
        checkInputState();
      }
    }

    // ===== 渲染设置表单 (支持下拉与自定义) =====
    function renderSettingsForm(provider) {
      document.querySelectorAll('.provider-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.provider === provider);
      });

      const config = STATE.settings.providers[provider];
      
      // 生成文本模型的选项
      const textOptions = PREDEFINED_MODELS[provider]?.text || [];
      const isTextCustom = !textOptions.includes(config.model) && config.model !== '';
      let textSelectHtml = `<select id="set-model-select" class="form-control" onchange="document.getElementById('set-model-custom').style.display = this.value === 'custom' ? 'block' : 'none'">`;
      if(textOptions.length > 0) {
        textOptions.forEach(opt => {
          textSelectHtml += `<option value="${opt}" ${(!isTextCustom && config.model === opt) ? 'selected' : ''}>${opt}</option>`;
        });
      }
      textSelectHtml += `<option value="custom" ${isTextCustom || textOptions.length === 0 ? 'selected' : ''}>自定义输入 (Custom)</option></select>`;
      
      // 生成视觉模型的选项
      const visionOptions = PREDEFINED_MODELS[provider]?.vision || [];
      const isVisionCustom = !visionOptions.includes(config.visionModel) && config.visionModel !== '';
      let visionSelectHtml = `<select id="set-vision-select" class="form-control" onchange="document.getElementById('set-vision-custom').style.display = this.value === 'custom' ? 'block' : 'none'">`;
      visionSelectHtml += `<option value="">-- 不支持或留空 --</option>`;
      if(visionOptions.length > 0) {
        visionOptions.forEach(opt => {
          visionSelectHtml += `<option value="${opt}" ${(!isVisionCustom && config.visionModel === opt) ? 'selected' : ''}>${opt}</option>`;
        });
      }
      visionSelectHtml += `<option value="custom" ${isVisionCustom && config.visionModel !== '' ? 'selected' : ''}>自定义输入 (Custom)</option></select>`;

      let html = `
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="set-apikey" class="form-control" value="${config.apiKey}" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label>Base URL (API接口地址)</label>
          <input type="text" id="set-baseurl" class="form-control" value="${config.baseUrl}">
        </div>
        <div class="form-group">
          <label>文本模型 (Text Model)</label>
          ${textSelectHtml}
          <input type="text" id="set-model-custom" class="form-control" style="display: ${isTextCustom || textOptions.length === 0 ? 'block' : 'none'}; margin-top: 6px;" value="${isTextCustom ? config.model : ''}" placeholder="请输入自定义模型名称">
        </div>
        <div class="form-group">
          <label>视觉模型 (Vision Model, 用于读图)</label>
          ${visionSelectHtml}
          <input type="text" id="set-vision-custom" class="form-control" style="display: ${isVisionCustom ? 'block' : 'none'}; margin-top: 6px;" value="${isVisionCustom ? config.visionModel : ''}" placeholder="请输入自定义视觉模型名称">
        </div>
      `;
      
      if (provider === 'mimo') {
        html += `<p style="font-size:12px;color:var(--text-secondary);margin-top:8px;">提示：MiMo 支持多模型调度。你可以下拉选择 <b>mimo-v2.5</b> 或全模态的 <b>mimo-v2-omni</b> 等。</p>`;
      }
      
      DOM.settingsForm.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // 启动应用
    init();
  </script>
</body>
</html>
