<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI 分析助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      position: relative;
    }
    .header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .model-badge {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .header .actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      color: #666;
    }
    .icon-btn:active { background: #f0f0f0; }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; width: 100%; }
    .message .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.user .bubble {
      background: #007aff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: #f0f0f0;
      color: #333;
      border-bottom-left-radius: 4px;
    }
    .message.assistant .bubble pre {
      background: #e0e0e0;
      padding: 8px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    .message.assistant .bubble code {
      font-family: monospace;
      background: #e0e0e0;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .file-attach {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .message.assistant .bubble.streaming {
      white-space: pre-wrap;
    }

    .input-area {
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .active-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
    }
    .active-skill-tag {
      background: #e0f0ff;
      color: #0066cc;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .active-skill-tag button {
      background: none;
      border: none;
      color: #0066cc;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .skill-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .input-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      resize: none;
      outline: none;
      max-height: 120px;
      font-family: inherit;
    }
    .input-row .btn {
      background: #007aff;
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-row .btn:active { opacity: 0.8; }
    .file-btn {
      background: #f0f0f0;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
    }
    .file-btn:active { background: #e0e0e0; }
    .uploaded-file-name {
      font-size: 12px;
      color: #666;
      background: #f9f9f9;
      padding: 2px 8px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal-content h3 { font-size: 16px; font-weight: 600; }
    .modal-content input, .modal-content select, .modal-content textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .modal-content textarea { resize: vertical; min-height: 80px; }
    .modal-content .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .modal-content .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary { background: #007aff; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-danger { background: #ff3b30; color: #fff; }

    .skill-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .skill-item:last-child { border-bottom: none; }
    .skill-item input[type="checkbox"] { margin-top: 2px; }
    .skill-item .skill-text {
      flex: 1;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #333;
    }
    .skill-item .skill-meta { font-size: 12px; color: #999; }
    .skill-item .del-btn {
      background: none;
      border: none;
      color: #ff3b30;
      cursor: pointer;
      font-size: 18px;
    }
    .empty-hint { color: #999; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>AI 助手 <span class="model-badge" id="currentModelBadge">deepseek-chat</span></h1>
      <div class="actions">
        <button class="icon-btn" id="clearBtn" title="清空对话">🗑️</button>
        <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
      </div>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="message assistant">
        <div class="bubble">你好！选择一个模型，从 Skill 库勾选想要的技能，就可以开始提问了。</div>
      </div>
    </div>

    <div class="input-area">
      <div class="active-skills" id="activeSkillsTags"></div>

      <div class="skill-actions">
        <button class="file-btn" id="skillLibraryBtn">🧩 Skill库</button>
        <label class="file-btn" title="上传文本文件">
          📎 文件
          <input type="file" id="fileInput" style="display:none;" accept=".txt,.md,.csv,.json,.xml,.yaml,.yml,.log,.py,.js,.html,.css,.java,.cpp,.c,.h">
        </label>
        <div id="fileTag" style="display:none; align-items:center; gap:4px; font-size:13px;">
          <span class="uploaded-file-name" id="fileNameTag">📎 文件</span>
          <button style="background:none; border:none; cursor:pointer; font-size:16px;" onclick="removeFile()">✕</button>
        </div>
      </div>

      <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="输入你的问题..."></textarea>
        <button class="btn" id="sendBtn">➤</button>
      </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <h3>⚙️ API 设置</h3>
        <label>DeepSeek API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-...">
        <label>模型</label>
        <select id="modelSelect">
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-coder">deepseek-coder</option>
        </select>
        <label>API 地址（默认 DeepSeek）</label>
        <input type="text" id="baseUrlInput" value="https://api.deepseek.com/v1/chat/completions">
        <div class="btn-row">
          <button class="btn btn-secondary" id="closeSettingsBtn">取消</button>
          <button class="btn btn-primary" id="saveSettingsBtn">保存</button>
        </div>
        <small style="color:#999;">Key 仅保存在你的浏览器中</small>
      </div>
    </div>

    <!-- Skill 库弹窗 -->
    <div class="modal" id="skillModal">
      <div class="modal-content">
        <h3>🧩 Skill 库</h3>
        <p style="font-size:13px; color:#666;">勾选要启用的 Skill，可多选。关闭后自动应用到新消息。</p>
        <div id="skillListContainer"></div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <input type="text" id="newSkillName" placeholder="Skill 名称（可选）" style="flex:1;">
          <button class="btn btn-primary" id="addSkillBtn">+ 新建</button>
        </div>
        <textarea id="newSkillContent" placeholder="输入 Skill 提示词模板（Markdown）..." rows="3"></textarea>
        <div class="btn-row">
          <button class="btn btn-secondary" id="closeSkillBtn">完成</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 所有变量和函数都包在一个 IIFE 里，避免污染
      let messages = [];
      let selectedFileContent = null;
      let selectedFileName = '';
      let activeSkillIds = [];
      let skills = [];

      // DOM 引用（在顶部获取，确保不为空）
      const chatContainer = document.getElementById('chatContainer');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const currentModelBadge = document.getElementById('currentModelBadge');
      const activeSkillsTags = document.getElementById('activeSkillsTags');
      const skillLibraryBtn = document.getElementById('skillLibraryBtn');
      const fileTag = document.getElementById('fileTag');
      const fileNameTag = document.getElementById('fileNameTag');
      const fileInput = document.getElementById('fileInput');
      const settingsBtn = document.getElementById('settingsBtn');
      const settingsModal = document.getElementById('settingsModal');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const saveSettingsBtn = document.getElementById('saveSettingsBtn');
      const apiKeyInput = document.getElementById('apiKeyInput');
      const modelSelect = document.getElementById('modelSelect');
      const baseUrlInput = document.getElementById('baseUrlInput');
      const clearBtn = document.getElementById('clearBtn');
      const skillModal = document.getElementById('skillModal');
      const skillListContainer = document.getElementById('skillListContainer');
      const newSkillName = document.getElementById('newSkillName');
      const newSkillContent = document.getElementById('newSkillContent');
      const addSkillBtn = document.getElementById('addSkillBtn');
      const closeSkillBtn = document.getElementById('closeSkillBtn');

      function loadSettings() {
        apiKeyInput.value = localStorage.getItem('ds_api_key') || '';
        modelSelect.value = localStorage.getItem('ds_model') || 'deepseek-chat';
        baseUrlInput.value = localStorage.getItem('ds_base_url') || 'https://api.deepseek.com/v1/chat/completions';
        updateModelBadge();
      }

      function saveSettings() {
        localStorage.setItem('ds_api_key', apiKeyInput.value.trim());
        localStorage.setItem('ds_model', modelSelect.value);
        localStorage.setItem('ds_base_url', baseUrlInput.value.trim());
        updateModelBadge();
      }

      function updateModelBadge() {
        currentModelBadge.textContent = modelSelect.value;
      }

      function loadSkills() {
        const saved = localStorage.getItem('skills_data');
        if (saved) {
          try { skills = JSON.parse(saved); } catch(e) { skills = []; }
        } else {
          skills = [
            { id: '1', name: '文档总结', content: '请对以下内容进行总结，突出关键点和结论：' },
            { id: '2', name: '代码分析', content: '请分析以下代码的功能、潜在问题和优化建议：' },
            { id: '3', name: '翻译为英文', content: '请将以下文本翻译为英文：' }
          ];
          saveSkills();
        }
        const active = localStorage.getItem('active_skill_ids');
        if (active) {
          try { activeSkillIds = JSON.parse(active); } catch(e) { activeSkillIds = []; }
        } else {
          activeSkillIds = [];
        }
      }

      function saveSkills() {
        localStorage.setItem('skills_data', JSON.stringify(skills));
      }

      function saveActiveSkills() {
        localStorage.setItem('active_skill_ids', JSON.stringify(activeSkillIds));
      }

      // 绑定事件前先初始化数据
      loadSettings();
      loadSkills();
      renderActiveSkillTags();

      // ---------- 事件绑定 ----------
      settingsBtn.addEventListener('click', () => settingsModal.classList.add('active'));
      closeSettingsBtn.addEventListener('click', () => settingsModal.classList.remove('active'));
      saveSettingsBtn.addEventListener('click', () => {
        saveSettings();
        settingsModal.classList.remove('active');
        addAssistantMessage('✅ 设置已保存。');
      });
      window.addEventListener('click', (e) => {
        if (e.target === settingsModal) settingsModal.classList.remove('active');
        if (e.target === skillModal) {
          skillModal.classList.remove('active');
          renderActiveSkillTags();
        }
      });

      skillLibraryBtn.addEventListener('click', openSkillModal);
      closeSkillBtn.addEventListener('click', () => {
        skillModal.classList.remove('active');
        renderActiveSkillTags();
      });

      function openSkillModal() {
        renderSkillList();
        skillModal.classList.add('active');
      }

      function renderSkillList() {
        skillListContainer.innerHTML = '';
        if (skills.length === 0) {
          skillListContainer.innerHTML = '<div class="empty-hint">暂无 Skill，在下方创建</div>';
          return;
        }
        skills.forEach(skill => {
          const isActive = activeSkillIds.includes(skill.id);
          const div = document.createElement('div');
          div.className = 'skill-item';
          div.innerHTML = `
            <input type="checkbox" ${isActive ? 'checked' : ''} data-id="${skill.id}">
            <div>
              <div class="skill-text">${escapeHtml(skill.content)}</div>
              <div class="skill-meta">${skill.name ? '名称: ' + escapeHtml(skill.name) : ''}</div>
            </div>
            <button class="del-btn" data-id="${skill.id}">🗑️</button>
          `;
          skillListContainer.appendChild(div);
        });

        document.querySelectorAll('#skillListContainer input[type="checkbox"]').forEach(cb => {
          cb.onchange = (e) => {
            const id = e.target.dataset.id;
            if (e.target.checked) {
              if (!activeSkillIds.includes(id)) activeSkillIds.push(id);
            } else {
              activeSkillIds = activeSkillIds.filter(i => i !== id);
            }
            saveActiveSkills();
            renderActiveSkillTags();
          };
        });

        document.querySelectorAll('#skillListContainer .del-btn').forEach(btn => {
          btn.onclick = (e) => {
            const id = e.target.dataset.id;
            if (confirm('确定删除这个 Skill 吗？')) {
              skills = skills.filter(s => s.id !== id);
              activeSkillIds = activeSkillIds.filter(i => i !== id);
              saveSkills();
              saveActiveSkills();
              renderSkillList();
              renderActiveSkillTags();
            }
          };
        });
      }

      addSkillBtn.onclick = () => {
        const name = newSkillName.value.trim();
        const content = newSkillContent.value.trim();
        if (!content) { alert('请输入 Skill 内容'); return; }
        const newId = Date.now().toString();
        skills.push({ id: newId, name: name || '未命名', content });
        saveSkills();
        newSkillName.value = '';
        newSkillContent.value = '';
        renderSkillList();
      };

      function renderActiveSkillTags() {
        activeSkillsTags.innerHTML = '';
        activeSkillIds.forEach(id => {
          const skill = skills.find(s => s.id === id);
          if (!skill) return;
          const tag = document.createElement('span');
          tag.className = 'active-skill-tag';
          tag.innerHTML = `${escapeHtml(skill.name || skill.content.slice(0,15))} <button data-id="${id}">✕</button>`;
          tag.querySelector('button').onclick = (e) => {
            e.stopPropagation();
            activeSkillIds = activeSkillIds.filter(i => i !== id);
            saveActiveSkills();
            renderActiveSkillTags();
            if (skillModal.classList.contains('active')) renderSkillList();
          };
          activeSkillsTags.appendChild(tag);
        });
      }

      function getCombinedSkillContent() {
        return activeSkillIds.map(id => skills.find(s => s.id === id)).filter(Boolean).map(s => s.content).join('\n\n');
      }

      // 文件上传
      fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFileName = file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
          selectedFileContent = event.target.result;
          fileNameTag.textContent = '📎 ' + selectedFileName;
          fileTag.style.display = 'flex';
        };
        reader.onerror = () => { alert('文件读取失败'); removeFile(); };
        reader.readAsText(file, 'UTF-8');
      };

      window.removeFile = function() {
        selectedFileContent = null;
        selectedFileName = '';
        fileInput.value = '';
        fileTag.style.display = 'none';
      };

      function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      function addMessageElement(role) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        msgDiv.appendChild(bubble);
        chatContainer.appendChild(msgDiv);
        return { msgDiv, bubble };
      }

      function addAssistantMessage(content) {
        const { bubble } = addMessageElement('assistant');
        bubble.innerHTML = marked.parse(content);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function addUserMessage(text, fileName) {
        const { bubble } = addMessageElement('user');
        let html = escapeHtml(text || '(已上传文件)');
        if (fileName) html += `<div class="file-attach">📎 ${escapeHtml(fileName)}</div>`;
        bubble.innerHTML = html;
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function createStreamingMessage() {
        const { bubble } = addMessageElement('assistant');
        bubble.classList.add('streaming');
        let content = '';
        return {
          append: (text) => {
            content += text;
            bubble.innerHTML = marked.parse(content);
            chatContainer.scrollTop = chatContainer.scrollHeight;
          },
          finalize: () => {
            bubble.classList.remove('streaming');
            return content;
          }
        };
      }

      clearBtn.onclick = () => {
        if (confirm('确定清空所有对话吗？')) {
          messages = [];
          chatContainer.innerHTML = '';
          addAssistantMessage('对话已清空。');
        }
      };

      async function sendMessage() {
        const userText = userInput.value.trim();
        const skillContent = getCombinedSkillContent();
        const hasFile = selectedFileContent !== null;

        if (!userText && !hasFile) {
          alert('请输入内容或上传文件');
          return;
        }

        let fullUserContent = '';
        if (skillContent) fullUserContent += skillContent + '\n\n';
        fullUserContent += userText || '';
        if (hasFile) fullUserContent += '\n\n【上传文件内容】\n' + selectedFileContent;

        addUserMessage(userText, selectedFileName);
        messages.push({ role: 'user', content: fullUserContent });
        userInput.value = '';
        removeFile();

        const apiKey = localStorage.getItem('ds_api_key');
        if (!apiKey) {
          addAssistantMessage('⚠️ 请先在右上角设置中填写 DeepSeek API Key。');
          return;
        }

        const streamMsg = createStreamingMessage();

        try {
          const baseUrl = localStorage.getItem('ds_base_url') || 'https://api.deepseek.com/v1/chat/completions';
          const model = localStorage.getItem('ds_model') || 'deepseek-chat';

          const requestBody = {
            model: model,
            messages: [
              { role: 'system', content: '你是专业、智能的助手，会用 Markdown 格式清晰回复。' },
              ...messages
            ],
            temperature: 0.7,
            max_tokens: 4096,
            stream: true
          };

          const response = await fetch(baseUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(requestBody)
          });

          if (!response.ok) {
            const errText = await response.text();
            let errMsg = `HTTP ${response.status}`;
            try {
              const errJson = JSON.parse(errText);
              errMsg = errJson.error?.message || errMsg;
            } catch(e) {}
            throw new Error(errMsg);
          }

          // 检查是否支持流式读取
          if (!response.body || !response.body.getReader) {
            // 不支持流式，退回普通 JSON 读取
            const data = await response.json();
            const content = data.choices?.[0]?.message?.content || '无回复';
            streamMsg.append(content);
            const finalContent = streamMsg.finalize();
            messages.push({ role: 'assistant', content: finalContent });
            return;
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let done = false;
          let buffer = '';

          while (!done) {
            const { value, done: readerDone } = await reader.read();
            done = readerDone;
            if (value) {
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';
              for (const line of lines) {
                if (line.startsWith('data: ')) {
                  const dataStr = line.slice(6).trim();
                  if (dataStr === '[DONE]') { done = true; break; }
                  try {
                    const parsed = JSON.parse(dataStr);
                    const content = parsed.choices?.[0]?.delta?.content;
                    if (content) streamMsg.append(content);
                  } catch(e) {}
                }
              }
            }
          }

          const finalContent = streamMsg.finalize();
          messages.push({ role: 'assistant', content: finalContent });
        } catch (error) {
          streamMsg.bubble.innerHTML = marked.parse(`❌ 请求失败：${error.message}`);
          streamMsg.finalize();
          messages.pop();
        }
      }

      sendBtn.onclick = sendMessage;
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = userInput.scrollHeight + 'px';
      });

    })();
  </script>
</body>
</html>
